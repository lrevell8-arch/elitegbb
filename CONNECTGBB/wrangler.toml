# =============================================================================
# SECRETS (Set via Wrangler CLI - NOT in this file!)
# =============================================================================
# These must be set using Wrangler secrets commands:
#
#   wrangler secret put SUPABASE_ANON_KEY
#   wrangler secret put NEXT_PUBLIC_SUPABASE_ANON_KEY
#   wrangler secret put JWT_SECRET
#
# When prompted, paste these values:
#
# SUPABASE_ANON_KEY / NEXT_PUBLIC_SUPABASE_ANON_KEY:
#   eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...(get from Supabase dashboard)
#
# JWT_SECRET (generate with: openssl rand -base64 32):
#   [YOUR_GENERATED_SECRET]
#
# To set for specific environment (production/preview):
#   wrangler secret put SUPABASE_ANON_KEY --env production
#   wrangler secret put NEXT_PUBLIC_SUPABASE_ANON_KEY --env production
#   wrangler secret put JWT_SECRET --env production
# =============================================================================

